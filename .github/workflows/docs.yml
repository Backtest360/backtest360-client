name: docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: build and deploy docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Build docs
        run: pdoc src/backtest360 -o public/

      - name: Deploy docs (dev preview)
        # Deploys to backtest360.com/client-docs/dev/
        # Requires DOCS_DEPLOY_TOKEN secret registered on this repo.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          publish_dir: ./public
          destination_dir: client-docs/dev
