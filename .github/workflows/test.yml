name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    name: "py${{ matrix.python-version }} pandas-${{ matrix.pandas-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        pandas-version: ["2.0.3", "latest"]
        exclude:
          - python-version: "3.12"
            pandas-version: "2.0.3"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for hatch-vcs tag resolution

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (pinned pandas)
        if: matrix.pandas-version != 'latest'
        run: pip install -e ".[dev]" "pandas==${{ matrix.pandas-version }}" "numpy<2.0"

      - name: Install (latest pandas)
        if: matrix.pandas-version == 'latest'
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy src/backtest360

      - name: Test
        run: pytest -q

      - name: Coverage gate
        run: pytest --cov=backtest360 --cov-fail-under=85 -q

  integration:
    name: integration
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.changed_files, 'src/backtest360/client.py') ||
        contains(github.event.pull_request.changed_files, 'src/backtest360/dtos.py')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest -q -m integration
        env:
          BACKTEST360_API_KEY: ${{ secrets.BACKTEST360_DEV_API_KEY }}
